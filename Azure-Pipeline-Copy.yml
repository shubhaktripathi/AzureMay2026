variables:
  - group: New variable group 26-May
#trigger when branch starts with feature/* and path given 
trigger:
 branches:
  include:
  - feature/*
  paths:
   include:
   - force-app/*
#pull request 
pr: 
 branches:
  include:
  - uat
  

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: build
    jobs: 
      - job: buildjob
        steps:
          - script: echo Hello, world!
            displayName: 'Run a one-line script'

          - script: |
              echo Add other tasks to build, test, and deploy your project.
              echo See https://aka.ms/yaml
            displayName: 'Run a multi-line script'

          - script: |
              npm install @salesforce/cli --global
              sf --version
            displayName: Install Salesforce CLI 

          - checkout: self
            fetchDepth: 0
            displayName: checkout to correct commit 

          - script: |
              echo $(SF_CLIENTID)
              echo $(SF_LOGINURL)
              echo $(SF_USERNAME)
            displayName: Print Variables

          - task: DownloadSecureFile@1
            name: securefile
            displayName: download certificate JWT
            inputs:
              secureFile: 'server.key'

          - script: sf org login jwt --username $(SF_USERNAME) --jwt-key-file $(securefile.secureFilePath) --client-id $(SF_CLIENTID) --set-default --alias ci-org --instance-url $(SF_LOGINURL)
            displayName: Authenticate to Salesforce
          
          - script: sf apex run test --target-org ci-org --test-level RunLocalTests --code-coverage --result-format human -d ./ --wait 10
            displayName: Run the Existing Test Cases

          - task: PythonScript@0
            inputs:
              scriptSource: 'filePath'
              scriptPath: 'CODE_COVERAGE.py'
            displayName: Run Code Coverage Check
      
          - script: |
              sf plugins install @salesforce/sfdx-scanner
            displayName: Install SF CLI Scanner

          - script: |
              mkdir reports
              sf scanner run --format html --target force-app/main/default/classes --engine pmd,pmd-appexchange --category Design,Best Practices,Code Style,Performance,Security,Documentation,Error Prone --outfile reports/scan-reports.html
            displayName: Run SF CLI Scan Report 

          - task: PublishBuildArtifacts@1
            displayName: 'Publish Build Artifacts'
            inputs:
              pathtoPublish: '$(Build.ArtifactStagingDirectory)'
              artifactName: 'drop'